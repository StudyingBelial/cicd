version: 2.1

jobs:
	build:
		docker:
			- image: cimg/python:3.13
		steps:
			- checkout
			- restore_cache:
					keys:
						- v1-pip-{{ arch }}-{{ checksum "requirements.txt" }}
						- v1-pip-{{ arch }}-
			- run:
					name: Install dependencies
					command: pip install -r requirements.txt
			- save_cache:
					key: v1-pip-{{ arch }}-{{ checksum "requirements.txt" }}
					paths:
						- ~/.cache/pip
			- run:
					name: Run app (smoke check)
					command: python main.py

	test:
		docker:
			- image: cimg/python:3.13
		steps:
			- checkout
			- restore_cache:
					keys:
						- v1-pip-{{ arch }}-{{ checksum "requirements.txt" }}
						- v1-pip-{{ arch }}-
			- run:
					name: Install dependencies
					command: pip install -r requirements.txt
			- save_cache:
					key: v1-pip-{{ arch }}-{{ checksum "requirements.txt" }}
					paths:
						- ~/.cache/pip
			- run:
					name: Run tests
					command: pytest main-test.py -v

workflows:
	ci_cd_pipeline:
		jobs:
			- build
			- test:
					requires:
						- build
